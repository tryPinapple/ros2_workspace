launch:
  # load script arguments, fallback to default
  - arg:
      name: "urdf_file"
      default: "$(find-pkg-share sub_launch)/urdf/asuqtr_sub.urdf"
  
  # 1. Sub control
  - node:
      pkg: "sub_control"
      exec: "control_node.py"
      name: "control_node"
      param:
        - from: "$(find-pkg-share sub_control)/config/params.yaml"

  # The TF Tree (Loads Sub geometry geometry)
  - node:
      pkg: "robot_state_publisher"
      exec: "robot_state_publisher"
      name: "robot_state_publisher"
      param:
        - name: "robot_description"
          value: "$(command 'cat $(var urdf_file)')"

  #  Sensor Fusion (for IMU + DVL + DepthSensor)
  - node:
      pkg: "robot_localization"
      exec: "ekf_node"
      name: "ekf_filter_node"
      param:
        - from: "$(find-pkg-share sub_launch)/config/robot_localization.yaml"


  # 2. Sub Hardware (Actuators & Sensors)
  - node:
      pkg: "sub_hardware"
      exec: "actuator_node.py"
      name: "actuator_node"
      param:
        - from: "$(find-pkg-share sub_hardware)/config/params.yaml"

  - node:
      pkg: "sub_hardware"
      exec: "sensor_node.py"
      name: "sensor_node"
      param:
        - from: "$(find-pkg-share sub_hardware)/config/params.yaml"
  
  - node:
      pkg: "sub_hardware"
      exec: "gpio_node.py"
      name: "gpio_node"
      param:
        - from: "$(find-pkg-share sub_hardware)/config/params.yaml"

  - node:
      pkg: "sub_hardware"
      exec: "dvl_node.py"
      name: "dvl_node"
      param:
        - from: "$(find-pkg-share sub_hardware)/config/params.yaml"

  - node:
      pkg: "vectornav"
      exec: "vectornav"
      name: "vectornav"
      param:
        - from: "$(find-pkg-share vectornav)/config/vectornav.yaml"
  
  # 3. Start ROSbridge for ASUQTR dashboard interaction
  - node:
      pkg: "rosbridge_server"
      exec: "rosbridge_websocket"
      name: "rosbridge_websocket"
      # Default port is 9090. You can override it here if needed.
